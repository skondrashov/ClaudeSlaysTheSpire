<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Claude Plays STS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1920px;
    height: 1080px;
    background: transparent;
    color: #f0f0f0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
  }

  /* L-shaped overlay: right sidebar + bottom bar */
  /* Top-left 1500x844 is transparent for the game */

  .sidebar {
    position: absolute;
    top: 0;
    right: 0;
    width: 420px;
    height: 1080px;
    background: rgba(8, 8, 12, 0.94);
    border-left: 3px solid rgba(140, 70, 230, 0.5);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 1500px;
    height: 236px;
    background: rgba(8, 8, 12, 0.94);
    border-top: 3px solid rgba(140, 70, 230, 0.5);
    display: flex;
    overflow: hidden;
  }

  /* === SIDEBAR: header + full reasoning log === */

  .header {
    background: linear-gradient(135deg, rgba(30,12,52,0.98), rgba(24,36,68,0.98));
    padding: 18px 20px;
    border-bottom: 3px solid #5a2a9a;
    flex-shrink: 0;
  }

  .header h1 {
    font-size: 26px;
    font-weight: 800;
    color: #d4a0ff;
    letter-spacing: 2px;
    text-align: center;
  }

  .section {
    padding: 16px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    flex-shrink: 0;
  }

  .section.grow {
    flex: 1;
    min-height: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .section-title {
    font-size: 15px;
    font-weight: 700;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 12px;
    flex-shrink: 0;
  }

  /* Reasoning log — scrollable, fills sidebar */
  .reasoning-log {
    flex: 1;
    overflow-y: auto;
    min-height: 0;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .reasoning-entry {
    padding-bottom: 14px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .reasoning-entry:first-child {
    font-size: 22px;
    line-height: 1.55;
    color: #eee;
  }

  .reasoning-entry:not(:first-child) {
    font-size: 18px;
    line-height: 1.45;
    color: #999;
  }

  .reasoning-entry .command-badge {
    display: inline-block;
    background: #5a2090;
    color: #e8d0ff;
    padding: 4px 14px;
    border-radius: 5px;
    font-size: 17px;
    font-weight: 600;
    font-family: 'Consolas', monospace;
    margin-bottom: 6px;
  }

  .reasoning-entry:first-child .command-badge {
    font-size: 20px;
    padding: 5px 16px;
    margin-bottom: 8px;
  }

  .reasoning-entry .reason-text {
    display: block;
  }

  .reasoning-empty {
    color: #555;
    font-style: italic;
    font-size: 22px;
  }

  /* === BOTTOM BAR === */
  /* Layout: stats (narrow) | actions (3-col, wide) | changelog (right) */

  .bottom-section {
    display: flex;
    flex-direction: column;
    padding: 14px 16px;
    border-right: 1px solid rgba(255,255,255,0.08);
    overflow: hidden;
  }

  .bottom-section.stats-section {
    width: 130px;
    flex-shrink: 0;
    justify-content: center;
    align-items: center;
  }

  .bottom-section.feed-section {
    flex: 1;
  }

  .bottom-section.changelog-section {
    width: 380px;
    flex-shrink: 0;
    border-right: none;
  }

  /* Run stats — compact column */
  .run-stats {
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: center;
  }

  .run-stat {
    font-size: 13px;
    color: #888;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    text-align: center;
  }

  .run-stat span {
    display: block;
    font-size: 28px;
    color: #f0f0f0;
    font-weight: 800;
    margin-top: 2px;
  }

  /* Action feed — 3 columns, bottom-aligned (newest = bottom-right) */
  .action-feed {
    flex: 1;
    display: flex;
    flex-direction: column;
    flex-wrap: wrap;
    align-content: flex-start;
    gap: 0 16px;
    overflow: hidden;
    min-height: 0;
  }

  .feed-entry {
    display: flex;
    align-items: baseline;
    padding: 3px 0;
    width: calc(33.33% - 11px);
  }

  .feed-action {
    font-family: 'Consolas', monospace;
    font-size: 17px;
    font-weight: 600;
    color: #d4a0ff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .feed-action.highlight {
    color: #4ade80;
  }

  /* State of the Game panel */
  .state-content {
    flex: 1;
    overflow-y: auto;
    min-height: 0;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .state-group-title {
    font-size: 12px;
    font-weight: 700;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 4px;
  }

  .state-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 2px 0;
  }

  .state-label {
    font-size: 14px;
    color: #777;
  }

  .state-value {
    font-size: 14px;
    color: #ddd;
    font-weight: 600;
  }

  .state-divider {
    border: none;
    border-top: 1px solid rgba(255,255,255,0.06);
    margin: 2px 0;
  }

  .loop-steps {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .loop-step {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: #aaa;
    line-height: 1.35;
  }

  .loop-step .step-num {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #5a2090;
    color: #e8d0ff;
    font-size: 12px;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .knowledge-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3px 12px;
  }

  .knowledge-item {
    font-size: 14px;
    color: #999;
    padding: 1px 0;
  }

  .knowledge-item span {
    color: #d4a0ff;
    font-weight: 700;
  }

  /* Hide all scrollbars */
  ::-webkit-scrollbar { width: 0; height: 0; display: none; }
  * { scrollbar-width: none; }
</style>
</head>
<body>

<!-- Right sidebar: reasoning history -->
<div class="sidebar">
  <div class="header">
    <h1>CLAUDE SLAYS THE SPIRE</h1>
  </div>

  <div class="section grow">
    <div class="reasoning-log" id="reasoningLog">
      <div class="reasoning-empty">Waiting for first decision...</div>
    </div>
  </div>
</div>

<!-- Bottom bar: stats | actions (3-col) | changelog -->
<div class="bottom-bar">
  <div class="bottom-section stats-section">
    <div class="run-stats" id="runStats">
      <div class="run-stat">Runs<span id="totalRuns">0</span></div>
      <div class="run-stat">Wins<span id="wins">0</span></div>
      <div class="run-stat">Best<span id="bestFloor">0</span></div>
    </div>
  </div>

  <div class="bottom-section feed-section">
    <div class="section-title">Actions</div>
    <div class="action-feed" id="actionFeed"></div>
  </div>

  <div class="bottom-section changelog-section">
    <div class="section-title">Claude Haiku 4.5</div>
    <div class="state-content">
      <div style="font-size:13px;color:#888;line-height:1.4;">
        Running on Haiku to save tokens while we iron out the pipeline.
      </div>

      <hr class="state-divider">

      <div>
        <div class="state-group-title">Knowledge Base</div>
        <div class="knowledge-grid" id="knowledgeGrid">
          <div class="knowledge-item"><span>40</span> cards</div>
          <div class="knowledge-item"><span>22</span> enemies</div>
          <div class="knowledge-item"><span>3</span> bosses</div>
          <div class="knowledge-item"><span>21</span> events</div>
          <div class="knowledge-item"><span>25</span> relics</div>
          <div class="knowledge-item"><span>19</span> potions</div>
        </div>
      </div>

      <hr class="state-divider">

      <div style="text-align:center;">
        <a href="https://claudeslaysthespire.org" style="color:#d4a0ff;font-size:13px;">claudeslaysthespire.org</a>
      </div>
    </div>
  </div>
</div>

<script>
const WS_URL = 'ws://127.0.0.1:3001';
let ws = null;
let reconnectDelay = 1000;

// Last known game state for translating commands
let lastState = null;

function connect() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    reconnectDelay = 1000;
  };

  ws.onmessage = (e) => {
    try {
      const event = JSON.parse(e.data);
      handleEvent(event);
    } catch {}
  };

  ws.onclose = () => {
    setTimeout(connect, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 1.5, 15000);
  };

  ws.onerror = () => ws.close();
}

function handleEvent(event) {
  switch (event.type) {
    case 'state':
      lastState = event;
      break;
    case 'decision':
      addReasoning(event);
      // skip_feed = true means individual feed entries are posted separately (batch turns)
      if (!event.skip_feed) {
        const cmd = event.command ? event.command.trim().split(/\s+/)[0] : '';
        const isPhase = cmd === 'end' || cmd === 'proceed' || cmd === 'start';
        const displayText = event.translated || translateCommand(event.command);
        addFeedEntry(displayText, isPhase);
      }
      break;
    case 'feed':
      addFeedEntry(event.text, event.highlight);
      break;
    case 'run_start':
      clearForNewRun();
      addFeedEntry('RUN ' + (event.run_number || '?') + ' — ' + event.class, true);
      if (event.run_number) {
        document.getElementById('totalRuns').textContent = event.run_number;
      }
      break;
    case 'run_end':
      addFeedEntry(
        (event.victory ? 'VICTORY' : 'DEFEAT') + ` — Floor ${event.floor}`,
        true
      );
      if (event.stats) updateRunStats(event.stats);
      break;
    case 'stats':
      updateRunStats(event);
      break;
    case 'reload':
      location.reload();
      break;
  }
}

// Translate raw commands into readable actions using last known state
function translateCommand(cmd) {
  if (!cmd) return cmd;

  const parts = cmd.trim().split(/\s+/);
  const verb = parts[0];

  if (verb === 'play' && lastState && lastState.hand) {
    const cardIdx = parseInt(parts[1]);
    const targetIdx = parts[2] !== undefined ? parseInt(parts[2]) : null;
    const card = lastState.hand ? lastState.hand[cardIdx - 1] : null;
    const cardName = card ? card.name : `card ${parts[1]}`;

    if (targetIdx !== null && lastState.enemies) {
      const enemy = lastState.enemies[targetIdx];
      const enemyName = enemy ? enemy.name : `enemy ${parts[2]}`;
      return `${cardName} → ${enemyName}`;
    }
    return cardName;
  }

  if (verb === 'choose' && lastState && lastState.choices) {
    const idx = parseInt(parts[1]);
    const choice = lastState.choices ? lastState.choices[idx] : null;
    if (choice) return `Choose: ${choice}`;
  }

  if (verb === 'end') return 'End Turn';
  if (verb === 'proceed') return 'Proceed';
  if (verb === 'skip' || verb === 'return') return 'Skip';
  if (verb === 'leave') return 'Leave';

  if (verb === 'potion') {
    const action = parts[1];
    if (action === 'use') return `Use Potion ${parts[2]}`;
    if (action === 'discard') return `Discard Potion ${parts[2]}`;
  }

  if (verb === 'start') return `Start — ${parts[1] || 'IRONCLAD'}`;

  return cmd;
}

function clearForNewRun() {
  // Clear reasoning log
  const log = document.getElementById('reasoningLog');
  log.innerHTML = '<div class="reasoning-empty">New run starting...</div>';

  // Clear action feed
  const feed = document.getElementById('actionFeed');
  feed.innerHTML = '';

  // Reset client-side state
  lastState = null;
}

function addReasoning(d) {
  const log = document.getElementById('reasoningLog');

  // Clear empty state
  const empty = log.querySelector('.reasoning-empty');
  if (empty) empty.remove();

  const entry = document.createElement('div');
  entry.className = 'reasoning-entry';
  let html = '';
  if (d.command) {
    const badgeText = d.translated || translateCommand(d.command);
    html += `<div class="command-badge">${esc(badgeText)}</div>`;
  }
  if (d.reasoning) {
    html += `<span class="reason-text">${esc(d.reasoning)}</span>`;
  }
  entry.innerHTML = html;

  log.insertBefore(entry, log.firstChild);

  // Keep max 20
  while (log.children.length > 20) {
    log.removeChild(log.lastChild);
  }

  log.scrollTop = 0;
}

// Actions: append to end (newest = bottom of last column)
function addFeedEntry(text, highlight) {
  const feed = document.getElementById('actionFeed');

  const entry = document.createElement('div');
  entry.className = 'feed-entry';
  entry.innerHTML = `
    <span class="feed-action${highlight ? ' highlight' : ''}">${esc(text || '')}</span>
  `;

  feed.appendChild(entry);

  // Remove oldest from the top when we overflow
  const maxEntries = 24; // ~8 per column x 3 columns
  while (feed.children.length > maxEntries) {
    feed.removeChild(feed.firstChild);
  }
}

function updateRunStats(s) {
  document.getElementById('totalRuns').textContent = s.total_runs || 0;
  document.getElementById('wins').textContent = s.wins || 0;
  document.getElementById('bestFloor').textContent = s.best_floor || 0;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

connect();
</script>
</body>
</html>
