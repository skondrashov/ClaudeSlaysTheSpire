<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Claude Plays STS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1920px;
    height: 1080px;
    background: transparent;
    color: #f0f0f0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
  }

  /* L-shaped overlay: right sidebar + bottom bar */
  /* Top-left 1500x844 is transparent for the game */

  .sidebar {
    position: absolute;
    top: 0;
    right: 0;
    width: 420px;
    height: 1080px;
    background: rgba(8, 8, 12, 0.94);
    border-left: 3px solid rgba(140, 70, 230, 0.5);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 1500px;
    height: 236px;
    background: rgba(8, 8, 12, 0.94);
    border-top: 3px solid rgba(140, 70, 230, 0.5);
    display: flex;
    overflow: hidden;
  }

  /* === SIDEBAR === */

  .header {
    background: linear-gradient(135deg, rgba(30,12,52,0.98), rgba(24,36,68,0.98));
    padding: 18px 20px;
    border-bottom: 3px solid #5a2a9a;
    flex-shrink: 0;
  }

  .header h1 {
    font-size: 22px;
    font-weight: 800;
    color: #d4a0ff;
    letter-spacing: 1.5px;
  }

  .header .subtitle {
    font-size: 14px;
    color: #aaa;
    margin-top: 4px;
    font-weight: 500;
  }

  .status-dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-right: 8px;
    vertical-align: middle;
  }

  .status-dot.connected { background: #4ade80; box-shadow: 0 0 8px #4ade8088; }
  .status-dot.disconnected { background: #f87171; box-shadow: 0 0 8px #f8717188; }
  .status-dot.connecting { background: #fbbf24; animation: pulse 1s infinite; }

  @keyframes pulse { 50% { opacity: 0.4; } }

  .section {
    padding: 16px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    flex-shrink: 0;
  }

  .section.grow {
    flex: 1;
    min-height: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .section-title {
    font-size: 13px;
    font-weight: 700;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 12px;
    flex-shrink: 0;
  }

  /* Thinking — big, readable, fills sidebar */
  .reasoning {
    flex: 1;
    overflow-y: auto;
    min-height: 0;
  }

  .reasoning .text {
    font-size: 18px;
    line-height: 1.55;
    color: #eee;
    font-weight: 400;
  }

  .reasoning .text.empty {
    color: #555;
    font-style: italic;
  }

  .reasoning .command-badge {
    display: inline-block;
    background: #5a2090;
    color: #e8d0ff;
    padding: 4px 14px;
    border-radius: 5px;
    font-size: 16px;
    font-weight: 600;
    font-family: 'Consolas', monospace;
    margin-bottom: 10px;
  }

  /* Enemies */
  .enemies {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .enemy {
    background: rgba(40, 20, 20, 0.9);
    border-radius: 6px;
    padding: 10px 14px;
    border-left: 4px solid #ef4444;
  }

  .enemy .name {
    font-weight: 700;
    font-size: 16px;
    color: #f0f0f0;
  }

  .enemy .details {
    font-size: 14px;
    color: #bbb;
    margin-top: 3px;
  }

  .hp-bar-container {
    height: 4px;
    background: #444;
    border-radius: 2px;
    margin-top: 5px;
    overflow: hidden;
  }

  .hp-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #ef4444, #f87171);
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  /* === BOTTOM BAR === */

  .bottom-section {
    display: flex;
    flex-direction: column;
    padding: 14px 20px;
    border-right: 1px solid rgba(255,255,255,0.08);
    overflow: hidden;
  }

  .bottom-section.log-section {
    width: 700px;
    flex-shrink: 0;
  }

  .bottom-section.stats-section {
    width: 240px;
    flex-shrink: 0;
    justify-content: center;
  }

  .bottom-section.open-space {
    flex: 1;
    border-right: none;
  }

  .action-log {
    flex: 1;
    overflow-y: auto;
    min-height: 0;
  }

  .log-entry {
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    animation: fadeIn 0.3s ease;
  }

  .log-entry:last-child { border-bottom: none; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; } }

  .log-entry .log-command {
    font-family: 'Consolas', monospace;
    font-size: 15px;
    font-weight: 600;
    color: #d4a0ff;
  }

  .log-entry .log-reason {
    font-size: 14px;
    color: #aaa;
    margin-top: 3px;
    line-height: 1.35;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .log-entry .log-time {
    font-size: 11px;
    color: #666;
    float: right;
    font-weight: 500;
  }

  .run-stats {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .run-stat {
    font-size: 14px;
    color: #888;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .run-stat span {
    display: block;
    font-size: 32px;
    color: #f0f0f0;
    font-weight: 800;
    margin-top: 2px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #555; border-radius: 2px; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="header">
    <h1><span class="status-dot disconnected" id="statusDot"></span>CLAUDE PLAYS STS</h1>
    <div class="subtitle" id="subtitle">Connecting...</div>
  </div>

  <div class="section grow">
    <div class="section-title">Thinking</div>
    <div class="reasoning" id="reasoning">
      <div class="text empty">Waiting for first decision...</div>
    </div>
  </div>

  <div class="section" id="enemySection" style="display:none">
    <div class="section-title">Enemies</div>
    <div class="enemies" id="enemies"></div>
  </div>
</div>

<div class="bottom-bar">
  <div class="bottom-section log-section">
    <div class="section-title">Action Log</div>
    <div class="action-log" id="actionLog"></div>
  </div>

  <div class="bottom-section stats-section">
    <div class="run-stats" id="runStats">
      <div class="run-stat">Runs<span id="totalRuns">0</span></div>
      <div class="run-stat">Wins<span id="wins">0</span></div>
      <div class="run-stat">Best<span id="bestFloor">0</span></div>
    </div>
  </div>

  <div class="bottom-section open-space"></div>
</div>

<script>
const WS_URL = 'ws://127.0.0.1:3001';
let ws = null;
let reconnectDelay = 1000;

function connect() {
  const dot = document.getElementById('statusDot');
  const sub = document.getElementById('subtitle');
  dot.className = 'status-dot connecting';
  sub.textContent = 'Connecting...';

  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    dot.className = 'status-dot connected';
    sub.textContent = 'Live';
    reconnectDelay = 1000;
  };

  ws.onmessage = (e) => {
    try {
      const event = JSON.parse(e.data);
      handleEvent(event);
    } catch {}
  };

  ws.onclose = () => {
    dot.className = 'status-dot disconnected';
    sub.textContent = 'Disconnected';
    setTimeout(connect, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 1.5, 15000);
  };

  ws.onerror = () => ws.close();
}

function handleEvent(event) {
  switch (event.type) {
    case 'state':
      updateState(event);
      break;
    case 'decision':
      addDecision(event);
      break;
    case 'run_start':
      document.getElementById('subtitle').textContent =
        `${event.class} — Run #${event.run_number}`;
      break;
    case 'run_end':
      addLogEntry(
        event.victory ? 'VICTORY' : 'DEFEAT',
        `Floor ${event.floor}`,
        true
      );
      break;
    case 'stats':
      updateRunStats(event);
      break;
  }
}

function updateState(s) {
  const section = document.getElementById('enemySection');
  const container = document.getElementById('enemies');
  if (s.in_combat && s.enemies && s.enemies.length > 0) {
    section.style.display = '';
    container.innerHTML = s.enemies.map(e => {
      const pct = e.max_hp > 0 ? (e.hp / e.max_hp * 100) : 0;
      return `<div class="enemy">
        <div class="name">${esc(e.name)}</div>
        <div class="details">HP: ${e.hp}/${e.max_hp} — Intent: ${esc(e.intent || '?')}</div>
        <div class="hp-bar-container"><div class="hp-bar-fill" style="width:${pct}%"></div></div>
      </div>`;
    }).join('');
  } else {
    section.style.display = 'none';
  }

  if (s.class && s.class !== '?') {
    const sub = document.getElementById('subtitle');
    const screen = s.screen !== 'NONE' ? ` — ${s.screen}` : s.in_combat ? ' — COMBAT' : '';
    sub.textContent = `${s.class} Floor ${s.floor}${screen}`;
  }
}

function addDecision(d) {
  const reasoning = document.getElementById('reasoning');
  let html = '';
  if (d.command) {
    html += `<div class="command-badge">${esc(d.command)}</div>`;
  }
  if (d.reasoning) {
    html += `<div class="text">${esc(d.reasoning)}</div>`;
  } else {
    html += `<div class="text empty">No reasoning provided</div>`;
  }
  reasoning.innerHTML = html;

  addLogEntry(d.command, d.reasoning);
}

function addLogEntry(command, reason, highlight) {
  const log = document.getElementById('actionLog');
  const now = new Date();
  const time = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });

  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = `
    <span class="log-time">${time}</span>
    <div class="log-command"${highlight ? ' style="color:#4ade80"' : ''}>${esc(command || '')}</div>
    ${reason ? `<div class="log-reason">${esc(reason)}</div>` : ''}
  `;

  log.insertBefore(entry, log.firstChild);

  while (log.children.length > 15) {
    log.removeChild(log.lastChild);
  }
}

function updateRunStats(s) {
  document.getElementById('totalRuns').textContent = s.total_runs || 0;
  document.getElementById('wins').textContent = s.wins || 0;
  document.getElementById('bestFloor').textContent = s.best_floor || 0;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

connect();
</script>
</body>
</html>
